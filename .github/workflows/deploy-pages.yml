name: Deploy to GitHub Pages

# Pages serves the gh-pages branch; this keeps it in sync with main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push main to gh-pages
        run: git push origin HEAD:gh-pages --force
